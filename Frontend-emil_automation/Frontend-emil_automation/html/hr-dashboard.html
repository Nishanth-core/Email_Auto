<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Dashboard — InnerWhispers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* Header */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #d4d2ca;
      padding-bottom: 1rem;
      margin-bottom: 1.75rem;
    }

    .page-header h1 {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #1a1a1a;
    }

    .page-header span {
      font-size: 12px;
      color: #888780;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    /* Nav pill strip */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888780;
      margin-bottom: 0.75rem;
    }

    .nav-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 0.5px solid #e8e6e0;
    }

    .nav-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
      border: 0.5px solid #b4b2a9;
      background: #fff;
      color: #1a1a1a;
      text-decoration: none;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .nav-pill:hover {
      background: #eceae3;
      border-color: #888780;
    }

    .nav-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-blue   { background: #378ADD; }
    .dot-green  { background: #639922; }
    .dot-purple { background: #7F77DD; }
    .dot-indigo { background: #534AB7; }
    .dot-red    { background: #E24B4A; }
    .dot-amber  { background: #BA7517; }
    .dot-pink   { background: #D4537E; }
    .dot-teal   { background: #1D9E75; }
    .dot-gray   { background: #5F5E5A; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888780;
      padding: 0 14px 10px;
      text-align: left;
      border-bottom: 1px solid #d4d2ca;
    }

    tbody td {
      font-size: 14px;
      color: #1a1a1a;
      padding: 16px 14px;
      border-bottom: 0.5px solid #e8e6e0;
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    .name  { font-weight: 500; font-size: 14px; }
    .email { font-size: 12px; color: #888780; margin-top: 3px; }
    .dept  { font-size: 13px; color: #5f5e5a; }

    /* Status badge */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      background: #f1efe8;
      color: #5f5e5a;
      border: 0.5px solid #d3d1c7;
      letter-spacing: 0.03em;
    }

    /* Email action buttons — 2-column grid */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      max-width: 280px;
    }

    .btn {
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 5px;
      border: 0.5px solid #b4b2a9;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
      transition: background 0.13s ease, opacity 0.13s ease;
      letter-spacing: 0.01em;
    }

    .btn:hover  { background: #eceae3; }
    .btn:active { opacity: 0.65; transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    #messageBox {
      margin-top: 1.25rem;
      font-size: 13px;
      color: #5f5e5a;
      text-align: center;
      min-height: 20px;
    }

    .compose-modal {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .compose-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(20,20,20,0.55);
    }

    .compose-card {
      position: relative;
      width: min(100%, 520px);
      max-height: 90vh;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #d4d2ca;
      border-radius: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.14);
      z-index: 1;
    }

    .compose-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid #e8e6e0;
    }

    .compose-body {
      padding: 1.25rem;
      display: grid;
      gap: 0.9rem;
    }

    .compose-body label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888780;
      margin-bottom: 0.35rem;
    }

    .compose-body input,
    .compose-body select {
      width: 100%;
      font-size: 14px;
      padding: 10px 11px;
      border: 1px solid #c9c7bf;
      border-radius: 8px;
      background: #ffffff;
      color: #1a1a1a;
      outline: none;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="page-header">
    <h1>HR Dashboard</h1>
    <span>InnerWhispers Wellness LLP</span>
  </div>

  <p class="section-label">Email modules</p>
  <nav class="nav-strip" aria-label="Email modules">
    <a href="index.html" class="nav-pill"><span class="dot dot-gray"></span>Home</a>
    <a href="profile-creation.html" class="nav-pill"><span class="dot dot-blue"></span>Profile Creation</a>
    <a href="application-email.html" class="nav-pill"><span class="dot dot-green"></span>Application Received</a>
    <a href="offer-letter.html" class="nav-pill"><span class="dot dot-amber"></span>Offer Letter</a>
    <a href="email-status.html" class="nav-pill"><span class="dot dot-teal"></span>Email Status</a>
  </nav>

  <div class="section-label">Bulk email</div>
  <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;align-items:center;">
    <select id="bulkEmailType" style="min-width:210px;padding:8px 10px;border:1px solid #c9c7bf;border-radius:6px;background:#fff;color:#1a1a1a;outline:none;">
      <option value="application_received">Application Received</option>
      <option value="interview_scheduled">Interview Scheduled</option>
      <option value="selection">Selection</option>
      <option value="rejection">Rejection</option>
      <option value="offer_letter">Offer Letter</option>
      <option value="onboarding_reminder">Onboarding Reminder</option>
    </select>
    <button class="btn btn-primary" id="bulkSendButton" onclick="sendBulkEmail()">Send bulk email</button>
    <button class="btn" onclick="toggleSelectAll()">Select all</button>
  </div>

  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()" /></th>
        <th>Name</th>
        <th>Department</th>
        <th>Status</th>
        <th>Email actions</th>
      </tr>
    </thead>
    <tbody id="candidateTableBody"></tbody>
  </table>

  <div id="messageBox"></div>

  <div id="composeModal" class="compose-modal">
    <div class="compose-backdrop" onclick="closeComposeModal()"></div>
    <div class="compose-card">
      <div class="compose-header">
        <div>
          <div class="section-label">Email composer</div>
          <h2 id="composeTitle" style="font-size:17px;margin-top:4px;">Send email</h2>
        </div>
        <button class="refresh-btn" onclick="closeComposeModal()">Close</button>
      </div>
      <div class="compose-body">
        <div>
          <label for="composeEmailType">Email type</label>
          <select id="composeEmailType">
            <option value="application_received">Application</option>
            <option value="interview_scheduled">Interview</option>
            <option value="selection">Selection</option>
            <option value="rejection">Rejection</option>
            <option value="offer_letter">Offer Letter</option>
            <option value="onboarding_reminder">Onboarding</option>
          </select>
        </div>
        <div>
          <label for="composeName">Candidate name</label>
          <input id="composeName" type="text" />
        </div>
        <div>
          <label for="composeEmail">Email address</label>
          <input id="composeEmail" type="email" />
        </div>
        <div>
          <label for="composeRole">Role</label>
          <input id="composeRole" type="text" />
        </div>
        <div>
          <label for="composeDepartment">Department</label>
          <input id="composeDepartment" type="text" />
        </div>
        <div>
          <label for="composeJoiningDate">Joining date</label>
          <input id="composeJoiningDate" type="text" />
        </div>
        <div>
          <label for="composeWorkMode">Work mode</label>
          <input id="composeWorkMode" type="text" />
        </div>
        <div>
          <label for="composeDeadline">Deadline</label>
          <input id="composeDeadline" type="text" />
        </div>
        <div id="composeStatus" style="font-size:13px;color:#5f5e5a;">Review email data and send.</div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
          <button class="btn" onclick="closeComposeModal()">Cancel</button>
          <button class="btn btn-primary" id="composeSendButton" onclick="confirmSendCompose()">Send email</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/dashboardActions.js"></script>
</body>
</html>
