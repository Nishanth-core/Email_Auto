<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Improved Email Status Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container { max-width: 820px; margin: 0 auto; }

    /* Header */
    .page-header {
      border-bottom: 1px solid #d4d2ca;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #1a1a1a;
    }

    .page-header p {
      font-size: 13px;
      color: #888780;
      margin-top: 4px;
    }

    /* Metric cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    @media (max-width: 600px) { .cards { grid-template-columns: repeat(2, 1fr); } }

    .card {
      background: #eceae3;
      border-radius: 8px;
      padding: 1rem;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888780;
    }

    .card-value {
      font-size: 28px;
      font-weight: 500;
      margin-top: 6px;
    }

    .v-blue  { color: #185fa5; }
    .v-green { color: #3b6d11; }
    .v-red   { color: #a32d2d; }
    .v-amber { color: #854f0b; }

    /* Section */
    .section {
      border: 1px solid #e8e6e0;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e8e6e0;
    }

    .section-header h2 {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .refresh-btn {
      font-size: 13px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #b4b2a9;
      background: transparent;
      color: #1a1a1a;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .refresh-btn:hover  { background: #f1efe8; }
    .refresh-btn:active { opacity: 0.7; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #888780;
      padding: 10px 16px;
      text-align: left;
      background: #faf9f6;
      border-bottom: 1px solid #e8e6e0;
    }

    tbody td {
      font-size: 14px;
      color: #1a1a1a;
      padding: 13px 16px;
      border-bottom: 1px solid #f1efe8;
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    .type-cell { font-size: 13px; color: #5f5e5a; }
    .time-cell { font-size: 13px; color: #888780; }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    .b-sent    { background: #eaf3de; color: #3b6d11; border: 1px solid #c0dd97; }
    .b-failed  { background: #fcebeb; color: #a32d2d; border: 1px solid #f7c1c1; }
    .b-pending { background: #faeeda; color: #854f0b; border: 1px solid #fac775; }
  </style>
</head>
<body>
  <div class="container">

    <div class="page-header">
      <h1>Email Status Dashboard</h1>
      <p>Monitor and manage internship email communications</p>
    </div>

    <div style="display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center;margin-bottom:1rem;">
      <a class="refresh-btn" href="index.html">Home</a>
      <a class="refresh-btn" href="hr-dashboard.html">Dashboard</a>
      <input id="searchInput" type="search" placeholder="Search candidate or email" style="flex:1;min-width:220px;padding:10px 12px;border:1px solid #c9c7bf;border-radius:8px;outline:none;background:#fff;color:#1a1a1a;" />
      <button class="refresh-btn" onclick="applySearch()">Search</button>
      <button class="refresh-btn" onclick="clearSearch()">Clear</button>
      <div id="healthStatus" style="margin-left:auto;font-size:13px;color:#5f5e5a;">Health: checking…</div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Total</div>
        <div class="card-value v-blue" id="totalEmails">0</div>
      </div>
      <div class="card">
        <div class="card-label">Sent</div>
        <div class="card-value v-green" id="sentEmails">0</div>
      </div>
      <div class="card">
        <div class="card-label">Failed</div>
        <div class="card-value v-red" id="failedEmails">0</div>
      </div>
      <div class="card">
        <div class="card-label">Pending</div>
        <div class="card-value v-amber" id="pendingEmails">0</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Recent activity</h2>
        <button class="refresh-btn" onclick="refreshDashboard()">Refresh</button>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>Intern name</th>
              <th>Email type</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="emailTableBody"></tbody>
        </table>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;">
        <div id="paginationControls"></div>
        <div id="tableStatus" style="font-size:13px;color:#5f5e5a;"></div>
      </div>
    </div>

  </div>

  <script src="../js/config.js"></script>
  <script>
    const API_BASE_URL = window.APP_CONFIG?.API_BASE_URL || "http://localhost:5000";
    const LOGS_PAGE_SIZE = 10;

    let currentPage = 1;
    let currentQuery = "";
    let currentPagination = null;

    const statusClass = (status) =>
      status === "Sent"
        ? "b-sent"
        : status === "Failed"
        ? "b-failed"
        : "b-pending";

    const updateStats = (stats) => {
      document.getElementById("totalEmails").innerText = stats.total ?? 0;
      document.getElementById("sentEmails").innerText = stats.sent ?? 0;
      document.getElementById("failedEmails").innerText = stats.failed ?? 0;
      document.getElementById("pendingEmails").innerText = stats.today ?? 0;
    };

    const renderTable = (logs) => {
      const tb = document.getElementById("emailTableBody");
      if (!tb) return;
      tb.innerHTML = "";

      if (!logs || logs.length === 0) {
        tb.innerHTML = `<tr><td colspan="4" style="padding:18px 14px;color:#5f5e5a;">No email logs found.</td></tr>`;
        return;
      }

      logs.forEach((log) => {
        const cls = statusClass(log.status);
        const dateLabel = log.sent_at ? new Date(log.sent_at).toLocaleString() : "-";
        tb.innerHTML += `
          <tr>
            <td>
              <div class="name">${log.intern_name || log.email || "Unknown"}</div>
              <div class="email">${log.email || "-"}</div>
            </td>
            <td class="type-cell">${log.email_type || "-"}</td>
            <td><span class="badge ${cls}">${log.status || "Pending"}</span></td>
            <td class="time-cell">${dateLabel}</td>
          </tr>`;
      });
    };

    const renderPagination = (pagination) => {
      currentPagination = pagination;
      const container = document.getElementById("paginationControls");
      if (!container || !pagination) return;

      const prevDisabled = pagination.page <= 1;
      const nextDisabled = pagination.page >= pagination.totalPages;

      container.innerHTML = `
        <button class="refresh-btn" ${prevDisabled ? "disabled" : ""} onclick="goToPage(${pagination.page - 1})">Previous</button>
        <span style="font-size:13px;color:#5f5e5a;margin:0 0.75rem;">Page ${pagination.page} of ${pagination.totalPages}</span>
        <button class="refresh-btn" ${nextDisabled ? "disabled" : ""} onclick="goToPage(${pagination.page + 1})">Next</button>
      `;
    };

    const setTableStatus = (message) => {
      const status = document.getElementById("tableStatus");
      if (status) status.innerText = message;
    };

    const checkHealth = async () => {
      const badge = document.getElementById("healthStatus");
      if (!badge) return;

      try {
        const response = await fetch(`${API_BASE_URL}/health`);
        badge.innerText = response.ok ? "Server Status: Online" : "Server Status: Offline";
        badge.style.color = response.ok ? "#1f6f38" : "#a32d2d";
      } catch (error) {
        badge.innerText = "Server Status: Offline";
        badge.style.color = "#a32d2d";
      }
    };

    const fetchStats = async () => {
      const response = await fetch(`${API_BASE_URL}/api/email/stats`);
      const data = await response.json();
      if (response.ok && data.success) {
        updateStats(data.data);
      } else {
        console.error("Stats fetch failed", data);
      }
    };

    const fetchLogs = async (page = 1, query = "") => {
      setTableStatus("Loading logs...");
      const url = query
        ? `${API_BASE_URL}/api/email/logs/search?q=${encodeURIComponent(query)}&page=${page}&limit=${LOGS_PAGE_SIZE}`
        : `${API_BASE_URL}/api/email/logs?page=${page}&limit=${LOGS_PAGE_SIZE}`;

      try {
        const response = await fetch(url);
        const json = await response.json();

        if (response.ok && json.success) {
          renderTable(json.data.logs || []);
          renderPagination(json.data.pagination || { page: 1, totalPages: 1 });
          setTableStatus(`Showing ${json.data.logs?.length ?? 0} records`);
        } else {
          throw new Error(json.message || "Failed to load logs");
        }
      } catch (error) {
        console.error(error);
        renderTable([]);
        setTableStatus("Failed to load logs.");
      }
    };

    async function refreshDashboard() {
      await checkHealth();
      await fetchStats();
      await fetchLogs(currentPage, currentQuery);
    }

    function applySearch() {
      currentQuery = document.getElementById("searchInput").value.trim();
      currentPage = 1;
      fetchLogs(currentPage, currentQuery);
    }

    function clearSearch() {
      currentQuery = "";
      document.getElementById("searchInput").value = "";
      currentPage = 1;
      fetchLogs(currentPage, currentQuery);
    }

    function goToPage(page) {
      if (!currentPagination) return;
      const nextPage = Math.max(1, Math.min(page, currentPagination.totalPages));
      currentPage = nextPage;
      fetchLogs(currentPage, currentQuery);
    }

    window.refreshDashboard = refreshDashboard;
    window.applySearch = applySearch;
    window.clearSearch = clearSearch;
    window.goToPage = goToPage;

    document.addEventListener("DOMContentLoaded", () => {
      refreshDashboard();
    });
  </script>
</body>
</html>
